id: snowflake
version: 1.0.0
title: Snowflake
description:
  short: Tor Snowflake Proxy
  long: Run a Snowflake proxy to help censored users access the Tor network.
license: BSD-3-Clause
min-os-version: 0.4.0
build:
  - make
assets:
  license: LICENSE
  icon: assets/icon.png
  instructions: instructions.md
# CRITICAL: Use docker-compose type for multi-service support
main:
  type: docker-compose
  docker-compose: docker-compose.yaml
volumes:
  main:
    type: data
interfaces:
  main:
    name: Snowflake Dashboard
    description: View proxy statistics
    ui: true  # Enables "Visit Website" button
    lan-config:
      56001:  # Or let StartOS assign dynamically
        ssl: false
        internal: 80  # Maps to nginx port 80 in 'ui' container
    protocols:
      - tcp
      - http
health-checks:
  running:
    name: Is Running
    success-message: Snowflake is running
    type: docker-compose
    container: snowflake-proxy
