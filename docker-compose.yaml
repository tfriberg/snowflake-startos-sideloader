version: "3.7"
services:
  snowflake-proxy:
    image: containers.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake:latest
    restart: unless-stopped
    volumes:
      - main:/data
    command: ["-metrics", "-log", "/data/snowflake.log", "-verbose"]

  ui:
    image: nginx:alpine
    restart: unless-stopped
    # Do NOT expose ports here - StartOS handles this via manifest
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - snowflake-proxy

volumes:
  main:
